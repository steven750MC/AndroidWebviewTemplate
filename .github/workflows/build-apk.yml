name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x ./02.AndroidWebviewOfflineAppTemplate/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            \~/.gradle/caches
            \~/.gradle/wrapper
          key: \( {{ runner.os }}-gradle- \){{ hashFiles('**/02.AndroidWebviewOfflineAppTemplate/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./02.AndroidWebviewOfflineAppTemplate/gradlew assembleDebug --stacktrace
        working-directory: ./02.AndroidWebviewOfflineAppTemplate

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: 02.AndroidWebviewOfflineAppTemplate/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30